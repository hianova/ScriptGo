<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ScriptGo Tauri UI</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background-color: #1e1e1e;
      color: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    #root {
      width: 100%;
      max-width: 600px;
      padding: 20px;
      border: 1px solid #333;
      border-radius: 8px;
      background-color: #2a2a2a;
    }
    .sg-view {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 10px;
      border: 1px solid #444;
      border-radius: 4px;
    }
    .sg-text {
      font-size: 16px;
    }
    .sg-button {
      padding: 10px 20px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
    }
    .sg-button:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>
  <h2>ScriptGo Native Render Engine</h2>
  <div id="root"></div>

  <script>
    const { listen } = window.__TAURI__.event;
    const root = document.getElementById('root');
    const elements = new Map();

    // Command mapping based on UICall arguments
    // Arg1: Element ID
    // Arg2: Command Type (1=CreateView, 2=CreateText, 3=CreateButton, 4=AppendChild)
    // Arg3: Parent/Extra data
    
    listen('ui-cmd', (event) => {
      const { arg1, arg2, arg3 } = event.payload;

      // Strict FFI Schema verification (Customs Barrier)
      if (typeof arg1 !== 'number' || typeof arg2 !== 'number' || typeof arg3 !== 'number') {
        console.error('[FFI Validation Failure]: Invalid parameter types', event.payload);
        return;
      }
      if (arg1 === 0 || arg2 < 1 || arg2 > 4) {
        console.error('[FFI Validation Failure]: Parameter boundaries violated', event.payload);
        return;
      }

      console.log(`Received UI Command: id=${arg1}, cmd=${arg2}, extra=${arg3}`);

      if (arg2 === 1) { // Create View
        const div = document.createElement('div');
        div.className = 'sg-view';
        div.id = `sg-${arg1}`;
        elements.set(arg1, div);
      } else if (arg2 === 2) { // Create Text
        const span = document.createElement('span');
        span.className = 'sg-text';
        span.id = `sg-${arg1}`;
        span.innerText = `ScriptGo Text Component ${arg1} (Data: ${arg3})`;
        elements.set(arg1, span);
      } else if (arg2 === 3) { // Create Button
        const btn = document.createElement('button');
        btn.className = 'sg-button';
        btn.id = `sg-${arg1}`;
        btn.innerText = `ScriptGo Button ${arg1}`;
        elements.set(arg1, btn);
      } else if (arg2 === 4) { // Append Child
        const child = elements.get(arg1);
        let parent = root;
        if (arg3 !== 0) {
          parent = elements.get(arg3);
        }
        if (parent && child) {
          parent.appendChild(child);
        }
      }
    });

    listen('ui-alert', (event) => {
       alert(event.payload.msg);
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ScriptGo Notes</title>
  <style>
    * { box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: transparent; 
      color: #eee; 
      margin: 0; 
      padding: 0; 
      display: flex; 
      height: 100vh; 
      overflow: hidden; 
      user-select: none; 
      -webkit-user-drag: none; 
      cursor: default; 
    }
    
    .markdown-body {
      user-select: text; 
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: rgba(150, 150, 150, 0.3); border-radius: 10px; }

    /* Custom Titlebar for Dragging */
    .titlebar {
      height: 30px;
      background: transparent;
      user-select: none;
      display: flex;
      justify-content: center;
      align-items: center;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 9999;
    }

    #sidebar { width: 300px; border-right: 1px solid rgba(255, 255, 255, 0.1); display: flex; flex-direction: column; background: transparent; padding-top: 30px; }
    #search-box { padding: 15px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
    #search-input { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid rgba(255, 255, 255, 0.2); background: rgba(0, 0, 0, 0.2); color: #fff; font-size: 14px; outline: none; }
    #list-container { flex: 1; overflow-y: auto; position: relative; }
    #scroll-spacer { width: 100%; }
    #render-window { position: absolute; top: 0; left: 0; width: 100%; }
    .note-item { height: 60px; padding: 10px 15px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); cursor: pointer; display: flex; flex-direction: column; justify-content: center; overflow: hidden; }
    .note-item:hover { background: rgba(255, 255, 255, 0.1); }
    .note-item.active { background: rgba(0, 122, 255, 0.6); }
    .note-title { font-weight: bold; font-size: 14px; white-space: nowrap; text-overflow: ellipsis; overflow: hidden; }
    .note-preview { font-size: 12px; color: #aaa; white-space: nowrap; text-overflow: ellipsis; overflow: hidden; margin-top: 4px; }
    
    #main-content { flex: 1; padding: 50px 30px 30px 30px; display: flex; flex-direction: column; background: rgba(18, 18, 18, 0.85); }
    #note-title-display { font-size: 24px; font-weight: bold; margin-bottom: 15px; }
    #note-content-display { flex: 1; white-space: pre-wrap; font-size: 15px; line-height: 1.6; color: #ddd; overflow-y: auto; }
    #perf-monitor { position: absolute; bottom: 10px; right: 10px; background: rgba(0,0,0,0.7); padding: 5px 10px; border-radius: 4px; font-size: 12px; color: #0f0; }
  </style>
</head>
<body>
  <div data-tauri-drag-region class="titlebar"></div>
  <div id="sidebar">
    <div id="search-box">
      <input type="text" id="search-input" placeholder="Search 10,000 notes...">
    </div>
    <div id="plugins-box" style="padding: 10px 15px; border-bottom: 1px solid rgba(255, 255, 255, 0.1);">
      <div style="font-size: 12px; color: #888; margin-bottom: 8px; font-weight: bold; text-transform: uppercase;">Wasm Plugins</div>
      <div id="plugins-container">
        <!-- Wasm plugin buttons will be added here -->
      </div>
    </div>
    <div id="list-container">
      <div id="scroll-spacer"></div>
      <div id="render-window"></div>
    </div>
  </div>
  <div id="main-content">
    <div id="note-title-display">Select a note</div>
    <div id="note-content-display" class="markdown-body">Content will appear here...</div>
    <div id="boss-panel" style="margin-top: 20px; padding: 10px; border-top: 1px solid rgba(255,255,255,0.1);">
      <button onclick="runBoss1()">⚔️ Boss 1: Fetch 100MB Mega-Note</button>
      <button onclick="runBoss2()">⚔️ Boss 2: Chaos Monkey</button>
      <div id="boss-log" style="margin-top: 10px; color: #ff0; font-family: monospace;"></div>
    </div>
  </div>
  <div id="perf-monitor">Wait: 0ms | IPC: 0ms</div>

  <script>
    const { invoke } = window.__TAURI__.tauri;
    
    // Virtual Scroll Logic
    let allNotes = [];
    const ITEM_HEIGHT = 60;
    const listContainer = document.getElementById('list-container');
    const scrollSpacer = document.getElementById('scroll-spacer');
    const renderWindow = document.getElementById('render-window');
    const bossLog = document.getElementById('boss-log');
    
    function logBoss(msg) { bossLog.innerText = msg; }
    
    // Virtual Scroll Implementation
    function renderList() {
      const scrollTop = listContainer.scrollTop;
      const containerHeight = listContainer.clientHeight;
      
      const startIndex = Math.floor(scrollTop / ITEM_HEIGHT);
      const endIndex = Math.min(allNotes.length, Math.ceil((scrollTop + containerHeight) / ITEM_HEIGHT) + 2); // Buffer of 2
      
      const offsetY = startIndex * ITEM_HEIGHT;
      renderWindow.style.transform = `translateY(${offsetY}px)`;
      
      let html = '';
      for (let i = startIndex; i < endIndex; i++) {
        const note = allNotes[i];
        if (!note) continue;
        html += `
          <div class="note-item" onclick="selectNote(${note.id}, \`${escapeHtml(note.title)}\`, \`${escapeHtml(note.content)}\`)">
            <div class="note-title">${escapeHtml(note.title)}</div>
            <div class="note-preview">${escapeHtml(note.content.substring(0, 50))}...</div>
          </div>
        `;
      }
      renderWindow.innerHTML = html;
    }
    
    listContainer.addEventListener('scroll', renderList);
    
    window.selectNote = function(id, title, content) {
      document.getElementById('note-title-display').innerText = title;
      document.getElementById('note-content-display').innerText = content;
    };
    
    function escapeHtml(unsafe) {
      if (!unsafe) return "";
      return unsafe.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;").replace(/`/g, "\\`");
    }

    // Wasm Plugin API
    window.addWasmPlugin = function(name) {
      const container = document.getElementById('plugins-container');
      const btn = document.createElement('button');
      btn.innerText = `🔌 ${name}`;
      btn.style.cssText = 'width: 100%; padding: 8px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 4px; color: #fff; cursor: pointer; text-align: left; margin-bottom: 5px; font-size: 13px;';
      btn.onclick = async () => {
        const start = performance.now();
        try {
          const html = await invoke('render_plugin', { name: name });
          const end = performance.now();
          document.getElementById('note-title-display').innerText = `Plugin: ${name}`;
          document.getElementById('note-content-display').innerHTML = html;
          document.getElementById('perf-monitor').innerText = `Wasm Render: ${(end - start).toFixed(2)}ms`;
        } catch(e) {
          console.error(e);
          document.getElementById('note-content-display').innerText = `Error: ${e}`;
        }
      };
      container.appendChild(btn);
    };

    let searchTimeout = null;
    document.getElementById('search-input').addEventListener('input', (e) => {
      const q = e.target.value;
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => {
        performSearch(q);
      }, 100);
    });

    async function performSearch(query) {
      const start = performance.now();
      try {
        allNotes = await invoke('search_notes', { query: query });
        const end = performance.now();
        document.getElementById('perf-monitor').innerText = `Results: ${allNotes.length} | IPC: ${(end - start).toFixed(2)}ms`;
        
        scrollSpacer.style.height = `${allNotes.length * ITEM_HEIGHT}px`;
        listContainer.scrollTop = 0;
        renderList();
      } catch(e) {
        console.error(e);
      }
    }

    // Boss 1: 100MB IPC Transfer
    window.runBoss1 = async function() {
      logBoss("Boss 1: Fetching 100MB mega note...");
      const start = performance.now();
      // Returns Uint8Array (zero-copy binary payload via Tauri 2 IPC)
      const data = await invoke('fetch_mega_note');
      const end = performance.now();
      logBoss(`Boss 1 Passed! Received ${data.length} bytes in ${(end - start).toFixed(2)} ms.`);
    }

    // Boss 2: Chaos Monkey (100 IPC/s)
    window.runBoss2 = function() {
      logBoss("Boss 2: Chaos Monkey started (100 req/s). Running for 10 seconds...");
      let drops = 0;
      let total = 0;
      
      const interval = setInterval(async () => {
        total++;
        try {
          // This happens while a background script overwrites logic.sgo
          await invoke('search_notes', { query: 'Markdown Note #123' });
        } catch(e) {
          drops++;
        }
      }, 10);
      
      setTimeout(() => {
        clearInterval(interval);
        logBoss(`Boss 2 Passed! Total requests: ${total}, Drop rate: ${(drops/total*100).toFixed(2)}%`);
      }, 10000);
    }

    // --- Drag and Drop Feature ---
    window.addEventListener("dragover", (ev) => {
      ev.preventDefault(); // Prevent default to allow drop
      document.body.style.opacity = '0.7';
    });

    window.addEventListener("dragleave", (ev) => {
      ev.preventDefault();
      document.body.style.opacity = '1';
    });

    window.addEventListener("drop", async (ev) => {
      ev.preventDefault();
      document.body.style.opacity = '1';
      
      if (ev.dataTransfer.files && ev.dataTransfer.files.length > 0) {
        const file = ev.dataTransfer.files[0];
        if (file.name.endsWith('.md') || file.type.includes('markdown') || file.type.includes('text') || file.name.includes('.')) {
          try {
            const buffer = await file.arrayBuffer();
            const utf8Decoder = new TextDecoder('utf-8', { fatal: true });
            let text;
            try {
              text = utf8Decoder.decode(buffer);
            } catch(e) {
              console.log("UTF-8 decoding failed, trying Big5...");
              const big5Decoder = new TextDecoder('big5');
              text = big5Decoder.decode(buffer);
            }
            
            const start = performance.now();
            const html = await invoke('parse_real_markdown', { md: text });
            const end = performance.now();
            
            document.getElementById('note-title-display').innerText = file.name;
            document.getElementById('note-content-display').innerHTML = html;
            document.getElementById('perf-monitor').innerText = `Rendered ${file.name} in ${(end - start).toFixed(2)}ms`;
          } catch(e) {
            console.error(e);
            logBoss("Error parsing dropped file: " + e);
          }
        } else {
            logBoss("Not a text or markdown file: " + file.type);
        }
      }
    });

    // Initial Load
    setTimeout(() => performSearch(""), 100);
  </script>
</body>
</html>

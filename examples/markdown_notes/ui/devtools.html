<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ScriptGo VM DevTools</title>
  <style>
    :root {
      --bg-base: #0f0f11;
      --bg-panel: #16161a;
      --accent: #00ffcc;
      --accent-glow: rgba(0, 255, 204, 0.15);
      --text: #e1e1e6;
      --text-muted: #888896;
      --border: rgba(255, 255, 255, 0.08);
      --red: #ff5555;
    }

    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg-base);
      color: var(--text);
      margin: 0;
      padding: 20px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 15px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 20px;
    }

    h1 {
      font-size: 20px;
      margin: 0;
      color: var(--accent);
      text-shadow: 0 0 10px var(--accent-glow);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .export-btn {
      background: rgba(0, 255, 204, 0.1);
      border: 1px solid var(--accent);
      color: var(--accent);
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: bold;
      transition: all 0.2s ease;
    }

    .export-btn:hover {
      background: var(--accent);
      color: #000;
      box-shadow: 0 0 12px var(--accent);
    }

    .layout {
      flex: 1;
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 20px;
      overflow: hidden;
    }

    .panel {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-header {
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.02);
      border-bottom: 1px solid var(--border);
      font-weight: bold;
      font-size: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .registers-grid {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }

    .register-card {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border);
      padding: 8px 12px;
      border-radius: 6px;
      font-family: monospace;
      font-size: 13px;
      display: flex;
      justify-content: space-between;
    }

    .register-card.active {
      border-color: var(--accent);
      background: var(--accent-glow);
    }

    .reg-num { color: var(--accent); }
    .reg-val { font-weight: bold; }

    .right-panels {
      display: grid;
      grid-template-rows: 1fr 1fr;
      gap: 20px;
      overflow: hidden;
    }

    .hex-dump {
      flex: 1;
      font-family: monospace;
      font-size: 12px;
      overflow-y: auto;
      padding: 15px;
      white-space: pre;
      line-height: 1.5;
      background: #09090b;
      color: #a1a1aa;
    }

    .hex-row {
      display: flex;
      gap: 15px;
    }

    .hex-addr { color: #52525b; }
    .hex-bytes { color: #e4e4e7; }
    .hex-ascii { color: #71717a; }

    .trace-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px 15px;
      font-family: monospace;
      font-size: 13px;
    }

    .trace-item {
      padding: 6px 0;
      border-bottom: 1px dotted var(--border);
      display: flex;
      gap: 15px;
    }

    .trace-pc { color: #facc15; }
    .trace-inst { color: #38bdf8; }
    .trace-change { color: #4ade80; }
  </style>
</head>
<body>
  <header>
    <h1>🚀 ScriptGo VM DevTools <span style="font-size:12px; font-weight:normal; color:var(--text-muted)">Live State Observer</span></h1>
    <button class="export-btn" onclick="exportTrace()">📥 Export .trace File</button>
  </header>

  <div class="layout">
    <!-- Left panel: Registers -->
    <div class="panel">
      <div class="panel-header">
        <span>Registers</span>
        <span style="color:var(--text-muted); font-size:12px;" id="pc-display">PC: 0</span>
      </div>
      <div class="registers-grid" id="registers-container">
        <!-- Dynamic registers -->
      </div>
    </div>

    <!-- Right panel: Memory and Trace -->
    <div class="right-panels">
      <!-- Memory dump -->
      <div class="panel">
        <div class="panel-header">Memory Dump (1KB Virtual RAM)</div>
        <div class="hex-dump" id="memory-container">
          <!-- Dynamic hex dump -->
        </div>
      </div>

      <!-- Trace -->
      <div class="panel">
        <div class="panel-header">Chronological Trace Log</div>
        <div class="trace-list" id="trace-container">
          <!-- Dynamic trace logs -->
        </div>
      </div>
    </div>
  </div>

  <script>
    const { invoke } = window.__TAURI__.tauri;

    async function updateState() {
      try {
        const state = await invoke('get_vm_devtools_state');
        
        // 1. Update PC
        document.getElementById('pc-display').innerText = `PC: ${state.pc}`;

        // 2. Update Registers
        const regContainer = document.getElementById('registers-container');
        let regHtml = '';
        for (let i = 0; i < 256; i++) {
          const val = state.registers[i];
          const isActive = val !== 0;
          regHtml += `
            <div class="register-card ${isActive ? 'active' : ''}">
              <span class="reg-num">R[${i}]</span>
              <span class="reg-val">${val}</span>
            </div>
          `;
        }
        regContainer.innerHTML = regHtml;

        // 3. Update Memory Dump (Hex / ASCII)
        const memContainer = document.getElementById('memory-container');
        let hexHtml = '';
        for (let offset = 0; offset < 1024; offset += 16) {
          let addr = offset.toString(16).toUpperCase().padStart(4, '0');
          let bytesStr = '';
          let asciiStr = '';
          for (let i = 0; i < 16; i++) {
            const byte = state.memory[offset + i];
            bytesStr += byte.toString(16).toUpperCase().padStart(2, '0') + ' ';
            // Printable ASCII check
            if (byte >= 32 && byte <= 126) {
              asciiStr += String.fromCharCode(byte);
            } else {
              asciiStr += '.';
            }
          }
          hexHtml += `<div class="hex-row"><span class="hex-addr">0x${addr}</span><span class="hex-bytes">${bytesStr}</span><span class="hex-ascii">${asciiStr}</span></div>`;
        }
        memContainer.innerHTML = hexHtml;

        // 4. Update Trace Logs
        const traceContainer = document.getElementById('trace-container');
        let traceHtml = '';
        state.trace.forEach((step, idx) => {
          let changeStr = '';
          if (step.reg_change) {
            changeStr = `R[${step.reg_change[0]}] -> ${step.reg_change[1]}`;
          } else if (step.mem_change) {
            changeStr = `RAM[${step.mem_change[0]}] -> ${step.mem_change[1]}`;
          }
          traceHtml += `
            <div class="trace-item">
              <span style="color:#52525b">[#${idx}]</span>
              <span class="trace-pc">PC:${step.pc.toString().padStart(3, '0')}</span>
              <span class="trace-inst">INST:0x${step.inst.toString(16).toUpperCase().padStart(8, '0')}</span>
              <span class="trace-change">${changeStr}</span>
            </div>
          `;
        });
        if (state.trace.length === 0) {
          traceHtml = '<div style="color:var(--text-muted); padding: 20px 0;">No instructions executed yet. Start searching to run VM scripts!</div>';
        }
        traceContainer.innerHTML = traceHtml;

      } catch(e) {
        console.error("Failed to fetch DevTools state", e);
      }
    }

    async function exportTrace() {
      try {
        const res = await invoke('export_vm_trace');
        alert(res);
      } catch(e) {
        alert("Failed to export trace: " + e);
      }
    }

    // Auto poll every 250ms
    setInterval(updateState, 250);
    // Initial fetch
    updateState();
  </script>
</body>
</html>

[package]
name = "script_go"
version = "0.1.0"
edition = "2021"

exclude = [".covopt/"]

[dependencies]
no_std_tool = { version = "1.0.0", path = "../no_std_tool" }

[dev-dependencies]
criterion = "0.5"
arc-swap = "1.6"
tokio = { version = "1", features = ["full"] }

[[bench]]
name = "vm_bench"
harness = false

[[bench]]
name = "concurrency_bench"
harness = false

[workspace]
members = [
    "tools/create-scriptgo-app",
    "examples/markdown_notes"
]
